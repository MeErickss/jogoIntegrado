<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Retro Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">

</head>

<body>

    <div class="table">
        <div class="cards">

            <div class="card">
                <div class="corner-top red">A<br>♥</div>
                <div class="center-text black">SOBRE</div>
                <div class="corner-bottom red">A<br>♥</div>
            </div>

            <div class="card">
                <div class="corner-top black">K<br>♣</div>
                <div class="center-text black">JOGAR</div>
                <div class="corner-bottom black">K<br>♣</div>
            </div>

            <div class="card">
                <div class="corner-top red">Q<br>♦</div>
                <div class="center-text black">AJUSTES</div>
                <div class="corner-bottom red">Q<br>♦</div>
            </div>

            <div class="card">
                <div class="corner-top black">J<br>♠</div>
                <div class="center-text black">CONTATO</div>
                <div class="corner-bottom black">J<br>♠</div>
            </div>

        </div>
    </div>

</body>

</html>
