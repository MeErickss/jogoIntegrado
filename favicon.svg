<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d98b"/>
      <stop offset="100%" stop-color="#c9922a"/>
    </radialGradient>
  </defs>

  <!-- Fundo transparente -->
  
  <!-- Lua (crescente usando mask) -->
  <mask id="moon-mask">
    <rect width="100%" height="100%" fill="white"/>
    <circle cx="38" cy="26" r="20" fill="black"/>
  </mask>

  <circle cx="32" cy="32" r="22" fill="url(#g)" mask="url(#moon-mask)"/>

  <!-- Glow sutil -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#c9922a" stroke-opacity="0.4" stroke-width="2"/>
</svg>